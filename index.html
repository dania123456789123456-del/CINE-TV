P<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>MI CINE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   TOKENS
═══════════════════════════════════════ */
:root{
  --zoom:1.0;   /* ← CAMBIA ESTE VALOR PARA TU TV (1.0=normal, 1.2=grande, 1.4=muy grande) */
  --bg:#0a0a0f;
  --s1:#12111a;
  --s2:#1c1929;
  --s3:#241f35;
  --accent:#7c3aed;
  --accent2:#a855f7;
  --glow:rgba(124,58,237,.35);
  --glow2:rgba(168,85,247,.2);
  --text:#f1f0f5;
  --muted:#7c748e;
  --danger:#ef4444;
  --gold:#f59e0b;
  --radius:12px;
  --card-w:160px;
  --card-h:240px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow:hidden;}
/* ZOOM GLOBAL TV */
#L-home, #L-login{ zoom: var(--zoom); }
/* GLOBAL BACKGROUND (backdrop dinámico) */
#globalBg{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;opacity:0;transition:opacity 1s,background-image .8s;pointer-events:none;}
#globalBg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 120% 80% at 50% 0%,rgba(10,10,15,.55) 0%,rgba(10,10,15,.92) 60%,var(--bg) 100%);}
#L-home{position:relative;z-index:1;}

/* ═══════════════════════════════════════
   CAPAS
═══════════════════════════════════════ */
.layer{position:fixed;inset:0;display:none;flex-direction:column;}
.layer.on{display:flex;}

/* ═══════════════════════════════════════
   LOGIN
═══════════════════════════════════════ */
#L-login{align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(124,58,237,.18) 0%,var(--bg) 70%);}
.login-wrap{width:100%;max-width:380px;padding:0 24px;}
.login-logo{font-family:'Outfit',sans-serif;font-weight:800;font-size:2.2rem;letter-spacing:-.5px;text-align:center;margin-bottom:8px;}
.login-logo span{color:var(--accent2);}
.login-sub{text-align:center;color:var(--muted);font-size:.9rem;margin-bottom:36px;}
.login-box{background:var(--s1);border:1px solid rgba(124,58,237,.25);border-radius:16px;padding:32px 28px;}
.field{margin-bottom:18px;}
.field label{display:block;font-size:.8rem;font-weight:500;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px;}
.field input{width:100%;background:var(--s2);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:13px 16px;color:var(--text);font-size:.95rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--accent);}
.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:#fff;font-family:'Outfit',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;margin-top:8px;transition:opacity .2s,transform .1s;}
.btn-login:hover{opacity:.9;}
.btn-login:active{transform:scale(.98);}
.login-err{color:var(--danger);font-size:.85rem;text-align:center;margin-top:12px;min-height:20px;}

/* ═══════════════════════════════════════
   HOME
═══════════════════════════════════════ */
#L-home{background:var(--bg);overflow:hidden;}

/* NAV */
.nav{flex-shrink:0;display:flex;align-items:center;gap:0;padding:0 24px;height:62px;background:linear-gradient(to bottom,rgba(10,10,15,.98),rgba(10,10,15,.0));position:relative;z-index:10;}
.nav-logo{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:-.3px;margin-right:32px;cursor:pointer;}
.nav-logo span{color:var(--accent2);}
.nav-tabs{display:flex;gap:4px;flex:1;}
.nav-tab{background:none;border:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:.9rem;font-weight:500;padding:8px 14px;border-radius:8px;cursor:pointer;transition:color .2s,background .2s;}
.nav-tab:hover{color:var(--text);background:var(--s2);}
.nav-tab.on{color:var(--text);}
.nav-tab.on::after{content:'';display:block;width:100%;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;margin-top:4px;}
.nav-right{display:flex;align-items:center;gap:12px;margin-left:auto;}
.search-wrap{position:relative;}
.search-inp{background:var(--s2);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:9px 14px 9px 36px;color:var(--text);font-size:.875rem;font-family:'Inter',sans-serif;width:200px;outline:none;transition:border-color .2s,width .3s;}
.search-inp:focus{border-color:var(--accent);width:260px;}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.btn-logout{background:var(--s2);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:8px 14px;color:var(--muted);font-size:.85rem;cursor:pointer;transition:color .2s;}
.btn-logout:hover{color:var(--text);}

/* SCROLL AREA */
.home-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:40px;}
.home-scroll::-webkit-scrollbar{width:4px;}
.home-scroll::-webkit-scrollbar-track{background:transparent;}
.home-scroll::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px;}

/* HERO */
.hero{position:relative;height:420px;overflow:hidden;flex-shrink:0;margin-bottom:8px;}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center top;transition:opacity .6s;}
.hero-fade{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(10,10,15,.5) 60%,rgba(10,10,15,.2) 100%);}
.hero-fade2{position:absolute;inset:0;background:linear-gradient(to right,var(--bg) 0%,transparent 60%);}
.hero-content{position:absolute;bottom:0;left:0;padding:36px 32px;max-width:520px;}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(124,58,237,.3);border:1px solid rgba(124,58,237,.4);border-radius:6px;padding:4px 10px;font-size:.75rem;font-weight:600;color:var(--accent2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px;}
.hero-title{font-family:'Outfit',sans-serif;font-weight:800;font-size:2.4rem;line-height:1.1;margin-bottom:12px;text-shadow:0 2px 12px rgba(0,0,0,.6);}
.hero-meta{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:.875rem;margin-bottom:22px;}
.hero-meta .rating{color:var(--gold);font-weight:600;}
.hero-desc{font-size:.9rem;line-height:1.6;color:rgba(241,240,245,.75);margin-bottom:24px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.hero-actions{display:flex;gap:12px;}
.btn-play{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;padding:13px 24px;color:#fff;font-family:'Outfit',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:transform .15s,box-shadow .2s;box-shadow:0 4px 20px var(--glow);}
.btn-play:hover{transform:translateY(-1px);box-shadow:0 6px 28px var(--glow);}
.btn-fav{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:13px 20px;color:var(--text);font-size:.9rem;cursor:pointer;transition:background .2s;}
.btn-fav:hover{background:rgba(255,255,255,.14);}
.btn-fav.saved{color:var(--gold);}

/* SECCIONES / CARRUSELES */
.section{padding:8px 0 0;}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:0 24px 14px;}
.section-title{font-family:'Outfit',sans-serif;font-weight:700;font-size:1.1rem;}
.section-title span{color:var(--accent2);}
.section-more{background:none;border:none;color:var(--muted);font-size:.82rem;cursor:pointer;transition:color .2s;}
.section-more:hover{color:var(--accent2);}
.carousel{display:flex;gap:14px;padding:0 24px 16px;overflow-x:auto;scroll-behavior:smooth;}
.carousel::-webkit-scrollbar{height:3px;}
.carousel::-webkit-scrollbar-track{background:transparent;}
.carousel::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px;}

/* CARDS */
.card{flex-shrink:0;width:var(--card-w);cursor:pointer;position:relative;}
.card-img{width:100%;height:var(--card-h);border-radius:var(--radius);overflow:hidden;background:var(--s2);border-top:1px solid rgba(124,58,237,.3);transition:transform .25s,box-shadow .25s;}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;}
.card:hover .card-img{transform:scale(1.04);box-shadow:0 8px 32px var(--glow);}
.card:hover .card-img img{transform:scale(1.06);}
.card-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--s2),var(--s3));font-size:2.5rem;}
.card-overlay{position:absolute;inset:0;border-radius:var(--radius);background:linear-gradient(to top,rgba(10,10,15,.92) 0%,transparent 55%);opacity:0;transition:opacity .25s;display:flex;align-items:flex-end;padding:10px;}
.card:hover .card-overlay{opacity:1;}
.card-play-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:7px;padding:9px;color:#fff;font-weight:700;font-size:.82rem;font-family:'Outfit',sans-serif;cursor:pointer;}
.card-info{padding:10px 2px 0;}
.card-title{font-family:'Outfit',sans-serif;font-weight:600;font-size:.875rem;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-year{color:var(--muted);font-size:.78rem;margin-top:3px;}
.card-fav{position:absolute;top:8px;right:8px;background:rgba(10,10,15,.7);border:none;border-radius:6px;padding:5px 6px;color:var(--muted);cursor:pointer;font-size:.95rem;z-index:2;transition:color .2s;}
.card-fav.on{color:var(--gold);}
.progress-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.15);border-radius:0 0 var(--radius) var(--radius);overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:inherit;}
.card-badge{position:absolute;top:8px;left:8px;background:rgba(124,58,237,.85);border-radius:5px;padding:3px 7px;font-size:.7rem;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.3px;}
.card-rating{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.75);border-radius:5px;padding:3px 7px;font-size:.72rem;font-weight:600;color:var(--gold);}

/* GRID (cuando se expande una sección) */
.grid-view{display:none;padding:0 24px;gap:16px;flex-wrap:wrap;}
.grid-view.on{display:flex;}

/* EMPTY STATE */
.empty-state{padding:60px 24px;text-align:center;color:var(--muted);}
.empty-state .icon{font-size:3rem;margin-bottom:16px;display:block;}
.empty-state p{font-size:.95rem;line-height:1.6;}

/* SEASON TABS (series detail) */
.season-tabs{display:flex;gap:8px;padding:0 0 16px;overflow-x:auto;}
.season-tab{flex-shrink:0;background:var(--s2);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:8px 16px;color:var(--muted);font-size:.85rem;cursor:pointer;transition:all .2s;}
.season-tab.on{background:var(--accent);border-color:var(--accent);color:#fff;}

/* EPISODE LIST */
.ep-list{display:flex;flex-direction:column;gap:10px;}
.ep-item{display:flex;align-items:center;gap:14px;background:var(--s2);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px 14px;cursor:pointer;transition:background .2s,border-color .2s;}
.ep-item:hover{background:var(--s3);border-color:rgba(124,58,237,.3);}
.ep-thumb{width:100px;height:58px;border-radius:7px;object-fit:cover;background:var(--s3);flex-shrink:0;border:1px solid rgba(255,255,255,.07);}
.ep-thumb-ph{width:100px;height:58px;border-radius:7px;background:var(--s3);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:1.3rem;border:1px solid rgba(255,255,255,.07);}
.ep-num{font-family:'Outfit',sans-serif;font-weight:700;font-size:1rem;color:var(--accent2);min-width:22px;}
.ep-info{flex:1;}
.ep-title{font-size:.88rem;font-weight:500;}
.ep-overview{font-size:.78rem;color:var(--muted);margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.ep-play{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:7px;padding:9px 16px;color:#fff;font-weight:700;font-size:.82rem;cursor:pointer;white-space:nowrap;flex-shrink:0;}

/* ═══════════════════════════════════════
   MODAL DETALLE
═══════════════════════════════════════ */
#L-detail{display:none;position:fixed;inset:0;z-index:50;background:rgba(10,10,15,.85);align-items:flex-end;justify-content:center;}
#L-detail.on{display:flex;}
.det-panel{background:var(--s1);border-radius:20px 20px 0 0;border-top:1px solid rgba(124,58,237,.25);width:100%;max-width:780px;max-height:90vh;overflow-y:auto;padding:0 0 40px;}
.det-backdrop{width:100%;height:200px;background-size:cover;background-position:center 20%;border-radius:20px 20px 0 0;flex-shrink:0;position:relative;}
.det-backdrop::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,10,15,.1) 0%,rgba(18,17,26,.98) 100%);border-radius:20px 20px 0 0;}
.det-inner{padding:0 28px 0;}
.det-panel::-webkit-scrollbar{width:3px;}
.det-panel::-webkit-scrollbar-thumb{background:var(--s3);}
.det-close{position:absolute;top:14px;right:14px;background:rgba(10,10,15,.7);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:7px 12px;color:var(--text);cursor:pointer;font-size:.9rem;z-index:5;transition:background .2s;}
.det-close:hover{background:rgba(255,255,255,.12);}
.det-inner{position:relative;padding:0 24px 0;}
.det-top{display:flex;gap:20px;margin-bottom:22px;clear:both;}
.det-poster{width:110px;height:165px;border-radius:10px;object-fit:cover;flex-shrink:0;background:var(--s2);}
.det-info{flex:1;}
.det-title{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.5rem;line-height:1.2;margin-bottom:8px;}
.det-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.det-chip{background:var(--s2);border-radius:6px;padding:4px 10px;font-size:.78rem;color:var(--muted);}
.det-chip.accent{background:rgba(124,58,237,.2);color:var(--accent2);}
.det-rating{color:var(--gold);font-weight:600;font-size:.9rem;}
.det-desc{font-size:.9rem;line-height:1.65;color:rgba(241,240,245,.75);margin-bottom:20px;}
.det-actions{display:flex;gap:10px;flex-wrap:wrap;}
.det-body{clear:both;}

/* ═══════════════════════════════════════
   PLAYER
═══════════════════════════════════════ */
#L-player{background:#000;z-index:100;}
.player-nav{flex-shrink:0;display:flex;align-items:center;gap:14px;padding:14px 20px;background:linear-gradient(to bottom,rgba(0,0,0,.9),transparent);position:absolute;top:0;left:0;right:0;z-index:5;}
.player-back{background:rgba(255,255,255,.1);border:none;border-radius:8px;padding:9px 14px;color:#fff;cursor:pointer;font-size:.9rem;display:flex;align-items:center;gap:6px;transition:background .2s;}
.player-back:hover{background:rgba(255,255,255,.18);}
.player-title{font-family:'Outfit',sans-serif;font-weight:700;font-size:1rem;color:#fff;}
.player-frame-wrap{position:absolute;inset:0;}
.player-frame-wrap iframe{width:100%;height:100%;border:none;}
.player-spinner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:4;pointer-events:none;}
.spinner-ring{width:44px;height:44px;border:3px solid rgba(124,58,237,.3);border-top-color:var(--accent2);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--s2);border:1px solid rgba(124,58,237,.3);border-radius:10px;padding:12px 22px;font-size:.88rem;color:var(--text);z-index:999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* ═══════════════════════════════════════
   TV OPTIMIZATION
═══════════════════════════════════════ */
@media(min-width:1080px) and (pointer:coarse){
  .card-img,.btn-play,.btn-fav,.ep-item{transition:none;}
  .hero-bg{transition:none;}
}

/* ═══════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════ */
@media(max-width:600px){
  :root{--card-w:130px;--card-h:195px;}
  .hero{height:320px;}
  .hero-title{font-size:1.7rem;}
  .hero-desc{display:none;}
  .search-inp{width:140px;}
  .search-inp:focus{width:180px;}
  .det-top{flex-direction:column;}
  .det-poster{width:100%;height:200px;}
}
</style>
</head>
<body>
<div id="globalBg"></div>

<!-- ═══ LOGIN ═══ -->
<div id="L-login" class="layer on">
  <div class="login-wrap">
    <div class="login-logo">MI <span>CINE</span></div>
    <p class="login-sub">Tu plataforma privada de entretenimiento</p>
    <div class="login-box">
      <div class="field">
        <label>Usuario</label>
        <input id="inpUser" type="text" placeholder="Ingresa tu usuario" autocomplete="username">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input id="inpPass" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-login" onclick="doLogin()">Entrar</button>
      <p class="login-err" id="loginErr"></p>
    </div>
  </div>
</div>

<!-- ═══ HOME ═══ -->
<div id="L-home" class="layer">
  <!-- NAV -->
  <nav class="nav">
    <div class="nav-logo">MI <span>CINE</span></div>
    <div class="nav-tabs">
      <button class="nav-tab on" onclick="showTab('all')">Inicio</button>
      <button class="nav-tab" onclick="showTab('movies')">Películas</button>
      <button class="nav-tab" onclick="showTab('series')">Series</button>
      <button class="nav-tab" onclick="showTab('history')">Historial</button>
      <button class="nav-tab" onclick="showTab('favs')">Favoritos</button>
    </div>
    <div class="nav-right">
      <div class="search-wrap">
        <svg class="search-icon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-inp" id="searchInp" type="text" placeholder="Buscar..." oninput="onSearch()">
      </div>
      <button class="btn-logout" onclick="doLogout()">⎋ Salir</button>
    </div>
  </nav>

  <!-- SCROLL -->
  <div class="home-scroll" id="homeScroll">

    <!-- HERO -->
    <div class="hero" id="heroBox">
      <div class="hero-bg" id="heroBg"></div>
      <div class="hero-fade"></div>
      <div class="hero-fade2"></div>
      <div class="hero-content" id="heroContent"></div>
    </div>

    <!-- CONTENIDO DINÁMICO -->
    <div id="homeSections"></div>

  </div>
</div>

<!-- ═══ DETALLE ═══ -->
<div id="L-detail">
  <div class="det-panel" id="detPanel"></div>
</div>

<!-- ═══ PLAYER ═══ -->
<div id="L-player" class="layer">
  <div class="player-nav">
    <button class="player-back" onclick="closePlayer()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Volver
    </button>
    <span class="player-title" id="playerTitle"></span>
  </div>
  <div class="player-spinner" id="playerSpinner"><div class="spinner-ring"></div></div>
  <div class="player-frame-wrap" id="playerFrameWrap">
    <iframe id="playerFrame" src="" allow="autoplay; fullscreen; accelerometer; gyroscope; encrypted-media; picture-in-picture" allowfullscreen></iframe>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════
   CONFIG — CAMBIA AQUÍ TUS CREDENCIALES Y JSON
═══════════════════════════════════════ */
const CONFIG = {
  users: [
    { user: 'admin', pass: '1234' },
    { user: 'dania', pass: 'micine123' }
  ],
  jsonUrl: 'data.json',   // <-- ruta a tu archivo JSON
  tmdbKey: '3ba1079b7db0165cabfc8282f7e5d7ee',
  tmdbLang: 'es-ES'
};

/* ═══════════════════════════════════════
   ESTADO GLOBAL
═══════════════════════════════════════ */
const S = {
  data: { movies: [], series: [] },
  tmdbCache: {},
  favs: JSON.parse(localStorage.getItem('mc_favs') || '[]'),
  history: JSON.parse(localStorage.getItem('mc_hist') || '[]'),
  currentTab: 'all',
  heroItem: null,
  heroType: null,
};

/* ═══════════════════════════════════════
   UTILIDADES
═══════════════════════════════════════ */
const $ = id => document.getElementById(id);
function show(id){ document.querySelectorAll('.layer').forEach(l=>l.classList.remove('on')); $(id).classList.add('on'); }
let toastTm;
function toast(msg){
  const t = $('toast'); t.textContent = msg; t.classList.add('on');
  clearTimeout(toastTm); toastTm = setTimeout(()=>t.classList.remove('on'), 2800);
}
function imgUrl(path, size='w500'){ return path ? `https://image.tmdb.org/t/p/${size}${path}` : ''; }
function isFav(id){ return S.favs.includes(id); }
function toggleFav(id, title){
  if(isFav(id)){ S.favs = S.favs.filter(x=>x!==id); toast(`❌ ${title} eliminado de favoritos`); }
  else { S.favs.push(id); toast(`⭐ ${title} añadido a favoritos`); }
  localStorage.setItem('mc_favs', JSON.stringify(S.favs));
}
function addHistory(id, type, title){
  S.history = S.history.filter(x=>x.id !== id);
  S.history.unshift({ id, type, title, ts: Date.now() });
  if(S.history.length > 40) S.history.pop();
  localStorage.setItem('mc_hist', JSON.stringify(S.history));
}

/* ═══════════════════════════════════════
   LOGIN
═══════════════════════════════════════ */
function doLogin(){
  const u = $('inpUser').value.trim();
  const p = $('inpPass').value;
  const ok = CONFIG.users.find(x=>x.user===u && x.pass===p);
  if(ok){
    $('loginErr').textContent = '';
    sessionStorage.setItem('mc_auth','1');
    initApp();
  } else {
    $('loginErr').textContent = '⚠ Usuario o contraseña incorrectos';
    $('inpPass').value='';
  }
}
function doLogout(){
  sessionStorage.removeItem('mc_auth');
  show('L-login');
  $('inpUser').value=''; $('inpPass').value='';
}
$('inpPass').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
$('inpUser').addEventListener('keydown', e=>{ if(e.key==='Enter') $('inpPass').focus(); });

/* ═══════════════════════════════════════
   TMDB
═══════════════════════════════════════ */
async function fetchTmdb(type, tmdbId){
  const key = type+'_'+tmdbId;
  if(S.tmdbCache[key]) return S.tmdbCache[key];
  try{
    const r = await fetch(`https://api.themoviedb.org/3/${type}/${tmdbId}?api_key=${CONFIG.tmdbKey}&language=${CONFIG.tmdbLang}`);
    if(!r.ok) return null;
    const d = await r.json();
    S.tmdbCache[key] = d;
    return d;
  } catch{ return null; }
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
async function initApp(){
  show('L-home');
  try{
    const r = await fetch(CONFIG.jsonUrl + '?v=' + Date.now());
    S.data = await r.json();
  } catch(e){
    toast('⚠ No se pudo cargar data.json');
    S.data = { movies: [], series: [] };
  }
  renderHome();
}

/* Auto-login si sesión activa */
if(sessionStorage.getItem('mc_auth')==='1') initApp();

/* ═══════════════════════════════════════
   RENDER HOME
═══════════════════════════════════════ */
function renderHome(){
  renderHero();
  renderSections();
}

/* HERO */
async function renderHero(){
  const pool = [...S.data.movies, ...S.data.series].filter(x=>x.bunny_embed || (x.seasons?.some(s=>s.episodes?.some(e=>e.bunny_embed))));
  if(!pool.length){ $('heroBox').style.display='none'; return; }
  const item = pool[Math.floor(Math.random()*pool.length)];
  const type = item.seasons ? 'tv' : 'movie';
  S.heroItem = item; S.heroType = type;
  const td = item.tmdb_id ? await fetchTmdb(type, item.tmdb_id) : null;
  const bg = td?.backdrop_path ? imgUrl(td.backdrop_path,'original') : '';
  const poster = td?.poster_path ? imgUrl(td.poster_path) : '';
  const desc = td?.overview || '';
  const rating = td?.vote_average ? td.vote_average.toFixed(1) : '';
  const year = item.year || (td?.release_date||td?.first_air_date||'').slice(0,4);
  if(bg) $('heroBg').style.backgroundImage = `url(${bg})`;
  $('heroContent').innerHTML = `
    <div class="hero-badge">⬟ Destacado</div>
    <div class="hero-title">${item.title}</div>
    <div class="hero-meta">
      ${rating?`<span class="rating">★ ${rating}</span>`:''}
      ${year?`<span>${year}</span>`:''}
      <span>${type==='movie'?'Película':'Serie'}</span>
    </div>
    ${desc?`<div class="hero-desc">${desc}</div>`:''}
    <div class="hero-actions">
      <button class="btn-play" onclick="playItem('${item.id}','${type}')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Reproducir
      </button>
      <button class="btn-fav ${isFav(item.id)?'saved':''}" onclick="toggleFav('${item.id}','${item.title.replace(/'/g,"\\'")}');this.className='btn-fav'+(isFav('${item.id}')?' saved':'')">
        ${isFav(item.id)?'★ Guardado':'☆ Favorito'}
      </button>
    </div>`;
}

/* SECTIONS */
function renderSections(){
  const tab = S.currentTab;
  const sec = $('homeSections');
  sec.innerHTML = '';

  // Búsqueda activa
  const q = $('searchInp').value.trim().toLowerCase();
  if(q){
    const movies = S.data.movies.filter(m=>m.title.toLowerCase().includes(q));
    const series = S.data.series.filter(s=>s.title.toLowerCase().includes(q));
    sec.appendChild(makeSection('🔍 Resultados', [...movies.map(m=>({...m,_type:'movie'})), ...series.map(s=>({...s,_type:'tv'}))]));
    return;
  }

  if(tab==='all' || tab==='movies'){
    const movies = S.data.movies.filter(m=>m.bunny_embed);
    if(movies.length) sec.appendChild(makeSection('🎬 Películas', movies.map(m=>({...m,_type:'movie'}))));
  }
  if(tab==='all' || tab==='series'){
    const series = S.data.series.filter(s=>s.seasons?.some(se=>se.episodes?.some(e=>e.bunny_embed)));
    if(series.length) sec.appendChild(makeSection('📺 Series', series.map(s=>({...s,_type:'tv'}))));
  }
  if(tab==='history'){
    if(!S.history.length){ sec.appendChild(emptyState('🕐','Aún no has visto nada','Empieza a explorar películas y series.')); return; }
    const items = S.history.map(h=>{
      const found = h.type==='movie' ? S.data.movies.find(m=>m.id===h.id) : S.data.series.find(s=>s.id===h.id);
      return found ? {...found, _type: h.type==='movie'?'movie':'tv'} : null;
    }).filter(Boolean);
    sec.appendChild(makeSection('🕐 Historial', items, true));
  }
  if(tab==='favs'){
    if(!S.favs.length){ sec.appendChild(emptyState('⭐','Sin favoritos','Guarda tus películas y series favoritas.')); return; }
    const items = S.favs.map(id=>{
      const m = S.data.movies.find(x=>x.id===id); if(m) return {...m,_type:'movie'};
      const s = S.data.series.find(x=>x.id===id); if(s) return {...s,_type:'tv'};
      return null;
    }).filter(Boolean);
    sec.appendChild(makeSection('⭐ Favoritos', items, true));
  }
}

function emptyState(icon, title, sub){
  const d = document.createElement('div');
  d.className = 'empty-state';
  d.innerHTML = `<span class="icon">${icon}</span><strong>${title}</strong><p>${sub}</p>`;
  return d;
}

function makeSection(title, items, grid=false){
  const wrap = document.createElement('div');
  wrap.className = 'section';
  wrap.innerHTML = `<div class="section-header"><h2 class="section-title">${title}</h2></div>`;
  const car = document.createElement('div');
  car.className = 'carousel';
  items.forEach(item=>{ car.appendChild(makeCard(item)); });
  wrap.appendChild(car);
  // Enrich cards with TMDB async
  items.forEach(item=>enrichCard(item));
  return wrap;
}

function makeCard(item){
  const div = document.createElement('div');
  div.className = 'card';
  div.id = 'card_'+item.id;
  div.addEventListener('mouseenter', ()=>{
    if(div.dataset.backdrop) setGlobalBg(div.dataset.backdrop);
  });
  div.addEventListener('mouseleave', ()=>{ clearGlobalBg(); });
  div.innerHTML = `
    <div class="card-img" onclick="openDetail('${item.id}','${item._type}')">
      <div class="card-placeholder">🎬</div>
      <div class="card-overlay">
        <button class="card-play-btn" onclick="event.stopPropagation();playItem('${item.id}','${item._type}')">
          ▶ Reproducir
        </button>
      </div>
    </div>
    <button class="card-fav ${isFav(item.id)?'on':''}" title="Favorito" onclick="toggleFav('${item.id}','${item.title.replace(/'/g,"\\'")}');this.className='card-fav'+(isFav('${item.id}')?' on':'')">
      ${isFav(item.id)?'★':'☆'}
    </button>
    <div class="card-info">
      <div class="card-title">${item.title}</div>
      <div class="card-year">${item.year||''}</div>
    </div>`;
  return div;
}

async function enrichCard(item){
  const type = item._type==='movie' ? 'movie' : 'tv';
  const td = item.tmdb_id ? await fetchTmdb(type, item.tmdb_id) : null;
  if(!td) return;
  const card = $('card_'+item.id);
  if(!card) return;
  const img = td.poster_path ? imgUrl(td.poster_path) : '';
  const ph = card.querySelector('.card-placeholder');
  if(img && ph){
    const el = card.querySelector('.card-img');
    const i = document.createElement('img');
    i.src = img; i.alt = item.title;
    i.onload = ()=>{ ph.replaceWith(i); };
  }
  const yr = card.querySelector('.card-year');
  if(yr && !item.year){
    yr.textContent = (td.release_date||td.first_air_date||'').slice(0,4);
  }
  // Rating badge
  if(td.vote_average && td.vote_average > 0){
    const ci = card.querySelector('.card-img');
    if(ci && !ci.querySelector('.card-rating')){
      const rb = document.createElement('div');
      rb.className = 'card-rating';
      rb.textContent = '★ '+td.vote_average.toFixed(1);
      ci.appendChild(rb);
    }
  }
  // Store backdrop for hover
  if(td.backdrop_path) card.dataset.backdrop = imgUrl(td.backdrop_path,'w780');
}

/* ═══════════════════════════════════════
   DETALLE
═══════════════════════════════════════ */
async function openDetail(id, type){
  const item = type==='movie' ? S.data.movies.find(x=>x.id===id) : S.data.series.find(x=>x.id===id);
  if(!item) return;
  const panel = $('detPanel');
  panel.innerHTML = `<div style="text-align:center;padding:60px"><div class="spinner-ring" style="margin:auto"></div></div>`;
  $('L-detail').classList.add('on');
  const tmdbType = type==='movie' ? 'movie' : 'tv';
  const td = item.tmdb_id ? await fetchTmdb(tmdbType, item.tmdb_id) : null;
  const poster   = td?.poster_path   ? imgUrl(td.poster_path,  'w342') : '';
  const backdrop = td?.backdrop_path ? imgUrl(td.backdrop_path,'w1280') : '';
  const desc     = td?.overview || 'Sin descripción disponible.';
  const rating   = td?.vote_average  ? td.vote_average.toFixed(1) : '';
  const year     = item.year || (td?.release_date||td?.first_air_date||'').slice(0,4);
  const genres   = (td?.genres||[]).map(g=>`<span class="det-chip">${g.name}</span>`).join('');

  // Update global background
  if(backdrop) setGlobalBg(backdrop);

  const favBtn = `<button class="btn-fav ${isFav(id)?'saved':''}" id="detFavBtn"
    onclick="toggleFav('${id}','${item.title.replace(/'/g,"\'")}');
    this.className='btn-fav'+(isFav('${id}')?' saved':'');
    this.textContent=isFav('${id}')?'★ Guardado':'☆ Favorito'">
    ${isFav(id)?'★ Guardado':'☆ Favorito'}
  </button>`;

  let body = '';
  const bdStyle = backdrop ? `background-image:url(${backdrop})` : 'background:var(--s3)';

  if(type==='movie'){
    const runtime = td?.runtime ? `${td.runtime} min` : '';
    body = `
      <div class="det-backdrop" style="${bdStyle}"></div>
      <div class="det-inner">
        <div class="det-top">
          ${poster?`<img class="det-poster" src="${poster}" alt="${item.title}">`:''}
          <div class="det-info">
            <div class="det-title">${item.title}</div>
            <div class="det-meta">
              ${year?`<span class="det-chip">${year}</span>`:''}
              ${runtime?`<span class="det-chip">${runtime}</span>`:''}
              ${rating?`<span class="det-chip accent">★ ${rating}</span>`:''}
              ${genres}
            </div>
            <div class="det-desc">${desc}</div>
            <div class="det-actions">
              <button class="btn-play" onclick="playItem('${id}','movie');closeDetail()">▶ Reproducir</button>
              ${favBtn}
            </div>
          </div>
        </div>
        <button class="det-close" onclick="closeDetail()">✕</button>
      </div>`;
  } else {
    const seasons = item.seasons || [];
    const seasonTabs = seasons.map((s,i)=>`<button class="season-tab ${i===0?'on':''}" onclick="showSeason('${id}',${i},${item.tmdb_id||'null'})">${s.title||'Temporada '+(i+1)}</button>`).join('');
    const tmdbSeason1Eps = item.tmdb_id ? await fetchTmdbSeason(item.tmdb_id, 1) : [];
    const firstEps = buildEpList(item, 0, tmdbSeason1Eps);
    body = `
      <div class="det-backdrop" style="${bdStyle}"></div>
      <div class="det-inner">
        <div class="det-top">
          ${poster?`<img class="det-poster" src="${poster}" alt="${item.title}">`:''}
          <div class="det-info">
            <div class="det-title">${item.title}</div>
            <div class="det-meta">
              ${year?`<span class="det-chip">${year}</span>`:''}
              ${rating?`<span class="det-chip accent">★ ${rating}</span>`:''}
              <span class="det-chip">${seasons.length} Temporada${seasons.length>1?'s':''}</span>
              ${genres}
            </div>
            <div class="det-desc">${desc}</div>
            <div class="det-actions">${favBtn}</div>
          </div>
        </div>
        <div class="det-body">
          <div class="season-tabs" id="seasonTabs_${id}">${seasonTabs}</div>
          <div class="ep-list" id="epList_${id}">${firstEps}</div>
        </div>
        <button class="det-close" onclick="closeDetail()">✕</button>
      </div>`;
  }

  panel.innerHTML = body;
}
/* ═══ GLOBAL BACKGROUND ═══ */
function setGlobalBg(url){
  const el = $('globalBg');
  el.style.backgroundImage = `url(${url})`;
  el.style.opacity = '1';
}
function clearGlobalBg(){
  const el = $('globalBg');
  el.style.opacity = '0';
}

/* ═══ TMDB SEASON EPISODES ═══ */
async function fetchTmdbSeason(tmdbId, seasonNum){
  const key = `season_${tmdbId}_${seasonNum}`;
  if(S.tmdbCache[key]) return S.tmdbCache[key];
  try{
    const r = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/${seasonNum}?api_key=${CONFIG.tmdbKey}&language=${CONFIG.tmdbLang}`);
    if(!r.ok) return [];
    const d = await r.json();
    const eps = d.episodes || [];
    S.tmdbCache[key] = eps;
    return eps;
  } catch{ return []; }
}

/* ═══ BUILD EPISODE LIST HTML ═══ */
function buildEpList(item, sIdx, tmdbEps){
  const eps = item.seasons?.[sIdx]?.episodes || [];
  return eps.map((ep, ei) => {
    const te = tmdbEps[ei] || {};
    const thumb = te.still_path ? imgUrl(te.still_path,'w300') : '';
    const overview = te.overview || '';
    const epTitle = ep.title || te.name || `Episodio ${ei+1}`;
    const thumbHtml = thumb
      ? `<img class="ep-thumb" src="${thumb}" alt="Ep ${ei+1}" loading="lazy">`
      : `<div class="ep-thumb-ph">▶</div>`;
    return `
      <div class="ep-item" onclick="playEpisode('${item.id}',${sIdx},${ei})">
        ${thumbHtml}
        <span class="ep-num">${ei+1}</span>
        <div class="ep-info">
          <div class="ep-title">${epTitle}</div>
          ${overview?`<div class="ep-overview">${overview}</div>`:''}
        </div>
        <button class="ep-play" onclick="event.stopPropagation();playEpisode('${item.id}',${sIdx},${ei})">▶</button>
      </div>`;
  }).join('');
}

async function showSeason(seriesId, sIdx, tmdbId){
  const item = S.data.series.find(x=>x.id===seriesId);
  if(!item) return;
  document.querySelectorAll(`#seasonTabs_${seriesId} .season-tab`).forEach((t,i)=>t.classList.toggle('on',i===sIdx));
  $('epList_'+seriesId).innerHTML = '<div style="padding:20px;text-align:center"><div class="spinner-ring" style="margin:auto"></div></div>';
  const tmdbEps = tmdbId ? await fetchTmdbSeason(tmdbId, sIdx+1) : [];
  $('epList_'+seriesId).innerHTML = buildEpList(item, sIdx, tmdbEps);
}

function closeDetail(){
  $('L-detail').classList.remove('on');
  clearGlobalBg();
}
$('L-detail').addEventListener('click', e=>{ if(e.target===$('L-detail')) closeDetail(); });

/* ═══════════════════════════════════════
   PLAYER
═══════════════════════════════════════ */
function playItem(id, type){
  if(type==='movie'){
    const m = S.data.movies.find(x=>x.id===id); if(!m) return;
    if(!m.bunny_embed){ toast('⚠ Este video no tiene reproductor configurado'); return; }
    addHistory(id,'movie',m.title);
    openPlayer(m.bunny_embed, m.title);
  } else {
    // Serie: reproducir primer episodio disponible
    const s = S.data.series.find(x=>x.id===id); if(!s) return;
    for(let si=0;si<(s.seasons||[]).length;si++){
      for(let ei=0;ei<(s.seasons[si].episodes||[]).length;ei++){
        if(s.seasons[si].episodes[ei].bunny_embed){
          playEpisode(id,si,ei); return;
        }
      }
    }
    toast('⚠ No hay episodios configurados');
  }
}

function playEpisode(seriesId, sIdx, eIdx){
  const s = S.data.series.find(x=>x.id===seriesId); if(!s) return;
  const ep = s.seasons?.[sIdx]?.episodes?.[eIdx]; if(!ep) return;
  if(!ep.bunny_embed){ toast('⚠ Episodio sin reproductor configurado'); return; }
  addHistory(seriesId,'series',s.title);
  const ttl = `${s.title} · T${sIdx+1} E${eIdx+1}${ep.title?' – '+ep.title:''}`;
  openPlayer(ep.bunny_embed, ttl);
  closeDetail();
}

function openPlayer(embedSrc, title){
  $('playerTitle').textContent = title;
  $('playerFrame').src = '';
  $('playerSpinner').style.display = 'flex';
  show('L-player');
  setTimeout(()=>{ $('playerFrame').src = embedSrc; }, 80);
  $('playerFrame').onload = ()=>{ $('playerSpinner').style.display = 'none'; };
  setTimeout(()=>{ $('playerSpinner').style.display='none'; }, 8000);
  screen.orientation?.lock('landscape').catch(()=>{});
}

function closePlayer(){
  $('playerFrame').src = '';
  show('L-home');
  screen.orientation?.unlock?.();
}

/* ═══════════════════════════════════════
   TABS Y BÚSQUEDA
═══════════════════════════════════════ */
function showTab(tab){
  S.currentTab = tab;
  $('searchInp').value = '';
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('on'));
  const idx = ['all','movies','series','history','favs'].indexOf(tab);
  document.querySelectorAll('.nav-tab')[idx]?.classList.add('on');
  const heroBox = $('heroBox');
  heroBox.style.display = (tab==='all') ? '' : 'none';
  renderSections();
}

let searchTm;
function onSearch(){ clearTimeout(searchTm); searchTm = setTimeout(renderSections, 280); }

/* ═══════════════════════════════════════
   BACK BUTTON (Android)
═══════════════════════════════════════ */
window.addEventListener('popstate', ()=>{
  if($('L-player').classList.contains('on')){ closePlayer(); history.pushState(null,'',''); }
  else if($('L-detail').classList.contains('on')){ closeDetail(); history.pushState(null,'',''); }
});
history.pushState(null,'','');
